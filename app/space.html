<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Production Card System</title>
    <style>
      /* CSS Reset & Global Production Style */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif, Arial;
        border-radius: 0 !important; /* Strict no radius */
      }

      body {
        background-color: #ffffff;
        color: #000000;
        padding: 40px;
      }

      /* Top Header Section */
      .header {
        max-width: 1200px;
        margin: 0 auto 40px auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 4px solid #000;
        padding-bottom: 20px;
      }

      .main-title {
        text-transform: uppercase;
        font-weight: 900;
        font-size: 24px;
      }

      /* Top Add Button */
      .btn-trigger {
        background: #000;
        color: #fff;
        border: 2px solid #000;
        padding: 10px 24px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 14px;
      }

      .btn-trigger:hover {
        background: #fff;
        color: #000;
      }

      /* Card Grid */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 40px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .production-card {
        position: relative;
        background: #fff;
        border: 4px solid #000;
        height: 240px;
        overflow: hidden;
        box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.1);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .production-card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 16px 16px 0 #000;
      }

      .card-content {
        padding: 25px;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .card-content h3 {
        font-size: 20px;
        font-weight: 900;
        margin-bottom: 12px;
        text-transform: uppercase;
        border-bottom: 3px solid #000;
        padding-bottom: 8px;
        display: block;
      }

      .card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .badge {
        padding: 4px 8px;
        font-size: 10px;
        font-weight: 900;
        text-transform: uppercase;
        border: 2px solid #000;
      }

      .badge.priority {
        background: #ffff00;
      }
      .badge.category {
        background: #00ffff;
      }
      .badge.date {
        background: #ffffff;
      }

      .card-content p {
        font-size: 13px;
        line-height: 1.4;
        font-weight: 500;
        color: #000;
        margin-bottom: 12px;
        flex-grow: 1;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
      }

      .card-tags {
        font-size: 11px;
        font-weight: 800;
        color: #666;
        font-style: italic;
      }

      /* Hover Overlay */
      .card-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px;
        opacity: 0;
        transition: opacity 0.2s;
        border: 4px solid #000;
        margin: -4px; /* Align with card border */
      }

      .production-card:hover .card-overlay {
        opacity: 1;
      }

      .btn-overlay {
        width: 160px;
        padding: 12px;
        border: 3px solid #000;
        background: #fff;
        color: #000;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 14px;
        transition: all 0.1s;
      }

      .btn-overlay:hover {
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 #000;
      }

      .btn-overlay.add:hover {
        background: #000;
        color: #fff;
      }

      .btn-overlay.remove {
        background: #ff0000;
        color: #fff;
      }

      .btn-overlay.remove:hover {
        background: #cc0000;
      }

      /* MODAL STYLES */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
      }

      .modal-content {
        background: #fff;
        border: 6px solid #000;
        width: 100%;
        max-width: 600px;
        max-height: 90vh;
        overflow-y: auto;
        padding: 40px;
        position: relative;
        box-shadow: 20px 20px 0 rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        font-weight: 900;
        text-transform: uppercase;
        font-size: 28px;
        margin-bottom: 30px;
        border-bottom: 6px solid #000;
        padding-bottom: 15px;
        letter-spacing: -1px;
      }

      .input-group {
        margin-bottom: 25px;
      }

      .input-group label {
        display: block;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 12px;
        margin-bottom: 8px;
        color: #000;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 14px;
        border: 3px solid #000;
        outline: none;
        font-size: 14px;
        background: #fff;
        color: #000;
        font-weight: 600;
      }

      input:focus,
      textarea:focus,
      select:focus {
        background: #f0f0f0;
        box-shadow: 4px 4px 0 #000;
      }

      textarea {
        height: 100px;
        resize: vertical;
      }

      .modal-actions {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }

      .btn-save {
        background: #000;
        color: #fff;
        flex: 2;
        padding: 16px;
        border: 3px solid #000;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.1s;
      }

      .btn-save:hover {
        background: #fff;
        color: #000;
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 #000;
      }

      .btn-save:active {
        transform: translate(0, 0);
        box-shadow: none;
      }

      .btn-close {
        background: #fff;
        color: #000;
        flex: 1;
        padding: 16px;
        border: 3px solid #000;
        font-weight: 900;
        cursor: pointer;
        text-transform: uppercase;
      }

      .btn-close:hover {
        background: #ff0000;
        color: #fff;
        border-color: #000;
      }

      /* Custom scrollbar for modal */
      .modal-content::-webkit-scrollbar {
        width: 10px;
      }
      .modal-content::-webkit-scrollbar-track {
        background: #fff;
        border-left: 3px solid #000;
      }
      .modal-content::-webkit-scrollbar-thumb {
        background: #000;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1 class="main-title">Inventory System</h1>
      <button class="btn-trigger" onclick="toggleModal(true)">
        + Add New Card
      </button>
    </header>

    <div class="card-grid">
      <div class="production-card">
        <div class="card-overlay">
          <button class="btn-overlay add">ADD</button>
          <button class="btn-overlay remove">REMOVE</button>
        </div>
        <div class="card-content">
          <h3>Sample Item 01</h3>
          <div class="card-meta">
            <span class="badge category">Design</span>
            <span class="badge priority">High</span>
            <span class="badge date">2026-05-15</span>
          </div>
          <p>
            This is a sample production item showing the new brutalist card
            layout with all data fields included.
          </p>
          <div class="card-tags">#design #project #new</div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="cardModal">
      <div class="modal-content">
        <div
          class="modal-header"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <span>Add New Entry</span>
          <span
            style="cursor: pointer; color: #ff0000; font-size: 24px"
            onclick="toggleModal(false)"
            >&times;</span
          >
        </div>

        <!-- Title -->
        <div class="input-group">
          <label>Card Title</label>
          <input type="text" placeholder="Enter Card Title..." />
        </div>

        <!-- Description -->
        <div class="input-group">
          <label>Description</label>
          <textarea placeholder="Write something..."></textarea>
        </div>

        <!-- Row 1: Category & Priority -->
        <div style="display: flex; gap: 20px">
          <div class="input-group" style="flex: 1">
            <label>Category</label>
            <select>
              <option>Select Category</option>
              <option>Design</option>
              <option>Development</option>
              <option>Marketing</option>
            </select>
          </div>
          <div class="input-group" style="flex: 1">
            <label>Priority</label>
            <select>
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
            </select>
          </div>
        </div>

        <!-- Row 2: Date & Upload -->
        <div style="display: flex; gap: 20px">
          <div class="input-group" style="flex: 1">
            <label>Due Date</label>
            <input type="date" />
          </div>
          <div class="input-group" style="flex: 1">
            <label>Upload File</label>
            <input type="file" id="inpfile"/>
          </div>
        </div>

        <!-- Tags -->
        <div class="input-group">
          <label>Tags</label>
          <input type="text" placeholder="#design #project"/>
        </div>

        <div class="modal-actions">
          <button class="btn-save" onclick="toggleModal(false)">
            Create Card
          </button>
          <button class="btn-close" onclick="toggleModal(false)">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById("cardModal");

      function toggleModal(show) {
        if (show) {
          modal.style.display = "flex";
        } else {
          modal.style.display = "none";
        }
      }

      window.onclick = function (event) {
        if (event.target == modal) {
          toggleModal(false);
        }
      };
    </script>
    <script>
      document.querySelector(".btn-save").addEventListener("click", () => {
        const titleVal = document.querySelector(
          "input[placeholder='Enter Card Title...']",
        ).value;
        const descVal = document.querySelector(
          "textarea[placeholder='Write something...']",
        ).value;
        const categoryVal =
          document.querySelectorAll("#cardModal select")[0].value;
        const priorityVal =
          document.querySelectorAll("#cardModal select")[1].value;
        const dateVal = document.querySelector(
          "#cardModal input[type='date']",
        ).value;
        const tagsVal = document.querySelector(
          "input[placeholder='#design #project']",
        ).value;
        const fileInput = document.querySelector("#inpfile").value;
        let fileName = fileInput.replace(/.*[\/\\]/, ''); // Get just the file name

        const newCard = `
          <div class="production-card">
            <div class="card-overlay">
              <button class="btn-overlay add">ADD</button>
              <button class="btn-overlay remove">REMOVE</button>
            </div>
            <div class="card-content">
              <h3>${titleVal || 1} </h3>
              <div class="card-meta">
                <span class="badge category">${categoryVal}</span>
                <span class="badge priority">${priorityVal}</span>
                <span class="badge date">${dateVal || "No Date"}</span>
              </div>
              <p>${descVal}</p>
              <div class="card-tags">${tagsVal}</div>
            </div>
          </div>
          <div>
             ${fileName}
            </div>
        `;

        document.querySelector(".card-grid").innerHTML += newCard;

        toggleModal(false);
      });
      let cardGrid = document.querySelector(".card-grid");

      cardGrid.addEventListener("click", (e) => {
        // alert();
        if (e.target.classList.contains("add")) {
          let card = e.target.closest(".production-card");
          let clone = card.cloneNode(true);

          cardGrid.appendChild(clone);
          let length = document.querySelectorAll(".production-card");
            length.forEach((card, index) => {
                card.querySelector("h3").textContent = `Sample Item ${
                index + 1
                }`;
            });
          
        }

        if (e.target.classList.contains("remove")) {
          let card = e.target.closest(".production-card");

          if (document.querySelectorAll(".production-card").length > 1) {
            card.remove();
          }
        }
      });
       </script>

  </body>
</html>
